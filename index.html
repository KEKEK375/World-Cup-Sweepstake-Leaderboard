<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Cup 2026 Sweepstake</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header>
  <div class="header-eyebrow">Canada · Mexico · USA</div>
  <h1>World Cup <span>2026</span></h1>
  <p class="header-sub">Sweepstake Standings — click a player to expand their teams</p>
  <p class="header-sub">Click the button in the top right to switch between light/dark themes</p>
  <button class="theme-btn" onclick="toggleTheme()" title="Toggle light/dark mode">☀</button>
</header>

<main>
  <div id="status">
    <div class="spinner"></div><br>Loading standings…
  </div>

  <div id="app" style="display:none">
    <div class="refresh-bar">
      Last updated: <span id="last-updated">—</span>
      <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
    </div>
    <div class="section-label">Upcoming Matches</div>
    <div id="fixtures"></div>

    <div class="section-label">Knockout Stage</div>
    <div id="knockout-tracker"></div>

    <div class="section-label">Qualifiers Leaderboard (Finished)</div>
    <div class="leaderboard" id="round-leaderboard"></div>
  </div>
</main>

<script>
  const STANDINGS_URL  = "https://api.fifa.com/api/v3/calendar/17/285023/289273/standing?language=en&count=200";
  const MATCHES_URL    = "https://api.fifa.com/api/v3/calendar/matches?language=en&count=500&idSeason=285023&from=2026-06-28";
  const SWEEPSTAKE_URL = "sweepstake.json";

  let standingsMap    = {};
  let teamIdMap       = {};
  let sweepstake      = {};
  let knockoutMatches = [];
  let eliminatedIds   = new Set();
  let eliminatedRound = {};  // IdTeam -> round name they were knocked out in

  // LOAD DATA FROM API //

  async function loadData() {
    document.getElementById("status").style.display = "block";
    document.getElementById("app").style.display    = "none";
    document.getElementById("status").innerHTML =
      '<div class="spinner"></div><br>Loading standings…';

    try {
      const [standingsRes, matchesRes, sweepRes] = await Promise.all([
        fetch(STANDINGS_URL,  { headers: { "accept": "application/json" } }),
        fetch(MATCHES_URL,    { headers: { "accept": "application/json" } }),
        fetch(SWEEPSTAKE_URL)
      ]);

      if (!standingsRes.ok) throw new Error(`FIFA standings API returned ${standingsRes.status}`);
      if (!matchesRes.ok)   throw new Error(`FIFA matches API returned ${matchesRes.status}`);
      if (!sweepRes.ok)     throw new Error(`Could not load sweepstake.json (${sweepRes.status})`);

      const standingsData = await standingsRes.json();
      const matchesData   = await matchesRes.json();
      sweepstake = await sweepRes.json();

      // Build group stage standings map
      standingsMap = {};
      teamIdMap    = {};
      for (const t of standingsData.Results) {
        const name = t.Team.Name[0].Description;
        const id   = t.Team.IdTeam;
        standingsMap[name] = {
          id,
          team:    name,
          country: t.Team.IdAssociation,
          group:   t.Group[0].Description,
          pos:     t.Position,
          played:  t.Played,
          won:     t.Won,
          drawn:   t.Drawn,
          lost:    t.Lost,
          gf:      t.For,
          ga:      t.Against,
          gd:      t.GoalsDiference,
          tcs:     t.TeamConductScore,
          points:  t.Points,
          qs:      t.QualificationStatus,
        };
        teamIdMap[id] = name;
      }

      // Separate knockout matches
      const allMatches = matchesData.Results || [];
      knockoutMatches  = allMatches.filter(m => m.StageName?.[0]?.Description !== "First Stage");

      // Build eliminated set + track which round they went out in
      eliminatedIds   = new Set();
      eliminatedRound = {};
      for (const m of knockoutMatches) {
        if (m.MatchStatus === 0 && m.Winner) {
          const homeId  = m.Home?.IdTeam;
          const awayId  = m.Away?.IdTeam;
          const loserId = homeId === m.Winner ? awayId : homeId;
          const round   = m.StageName?.[0]?.Description ?? "Knockout";
          if (loserId) {
            eliminatedIds.add(loserId);
            eliminatedRound[loserId] = round;
          }
        }
      }

      renderFixtures(allMatches);
      renderKnockoutTracker();
      renderQualifiersLeaderboard();

      document.getElementById("last-updated").textContent = new Date().toLocaleTimeString();
      document.getElementById("status").style.display = "none";
      document.getElementById("app").style.display    = "block";

    } catch (err) {
      document.getElementById("status").innerHTML = `
        <p class="error-msg">⚠ Could not load data</p>
        <p class="cors-note">${err.message}<br><br>
        If you're opening this file directly (file://), the FIFA API will block the request due to CORS.
        Host via a local server (<code>python -m http.server</code>) or deploy to GitHub Pages.</p>`;
    }
  }

  // HELPER FUNCTIONS //

  function getPlayerTotals(teams) {
    return teams.reduce((tot, teamName) => {
      const t = standingsMap[teamName];
      if (!t) return tot;
      tot.played += t.played;
      tot.won    += t.won;
      tot.drawn  += t.drawn;
      tot.lost   += t.lost;
      tot.gf     += t.gf;
      tot.ga     += t.ga;
      tot.gd     += t.gd;
      tot.tcs    += t.tcs;
      tot.points += t.points;
      return tot;
    }, { played: 0, won: 0, drawn: 0, lost: 0, gf: 0, ga: 0, gd: 0, tcs: 0, points: 0 });
  }

  function fmtGD(n) { return n > 0 ? `+${n}` : `${n}`; }

  function fmtDate(utcStr) {
    return new Date(utcStr).toLocaleString("en-GB", {
      weekday: "short", day: "numeric", month: "short",
      hour: "2-digit", minute: "2-digit", timeZoneName: "short"
    });
  }

  function flagUrl(countryId) {
    return countryId ? `https://api.fifa.com/api/v3/picture/flags-sq-1/${countryId}` : "";
  }

  function sweepstakeOwner(teamName) {
    for (const [person, teams] of Object.entries(sweepstake)) {
      if (teams.includes(teamName)) return person;
    }
    return null;
  }

  function qsBadge(qs) {
    const map = {
      ConfirmedQualified: ["qs-qualified",  "Qualified"],
      CouldQualify:       ["qs-could",      "Could Qualify"],
      Eliminated:         ["qs-eliminated", "Eliminated"],
    };
    const [cls, label] = map[qs] ?? ["qs-undefined", "—"];
    return `<span class="qs-badge ${cls}">${label}</span>`;
  }

  // UPCOMING FIXTURES //

  function renderFixtures(allMatches) {
    const container = document.getElementById("fixtures");

    const upcoming = allMatches
      .filter(m => m.MatchStatus === 1 || m.MatchStatus === 3)
      .sort((a, b) => new Date(a.Date) - new Date(b.Date))
      .slice(0, 3);

    if (!upcoming.length) {
      container.innerHTML = `<p class="muted-note">No upcoming matches.</p>`;
      return;
    }

    container.innerHTML = upcoming.map(m => {
      const home      = m.Home?.TeamName?.[0]?.Description ?? "TBD";
      const away      = m.Away?.TeamName?.[0]?.Description ?? "TBD";
      const homeId    = m.Home?.IdCountry ?? "";
      const awayId    = m.Away?.IdCountry ?? "";
      const stage     = m.StageName?.[0]?.Description ?? "";
      const stadium   = m.Stadium?.Name?.[0]?.Description ?? "";
      const city      = m.Stadium?.CityName?.[0]?.Description ?? "";
      const homeOwner = sweepstakeOwner(home);
      const awayOwner = sweepstakeOwner(away);

      return `
        <div class="fixture-card">
          <div class="fixture-meta">${stage} &middot; ${fmtDate(m.Date)}</div>
          <div class="fixture-body">

            <div class="fixture-team fixture-home">
              <img class="fixture-flag" src="${flagUrl(homeId)}" alt="${home}" />
              <div class="fixture-info">
                ${homeOwner ? `<div class="fixture-owner">${homeOwner}</div>` : `<div class="fixture-owner fixture-owner-none">&nbsp;</div>`}
                <div class="fixture-name">${home}</div>
              </div>
            </div>

            <div class="fixture-vs">VS</div>

            <div class="fixture-team fixture-away">
              <div class="fixture-info fixture-info-right">
                ${awayOwner ? `<div class="fixture-owner">${awayOwner}</div>` : `<div class="fixture-owner fixture-owner-none">&nbsp;</div>`}
                <div class="fixture-name">${away}</div>
              </div>
              <img class="fixture-flag" src="${flagUrl(awayId)}" alt="${away}" />
            </div>

          </div>
          <div class="fixture-venue">&#128205; ${stadium}, ${city}</div>
        </div>`;
    }).join("");
  }

  // KNOCKOUT TRACKER //

  function renderKnockoutTracker() {
    const container = document.getElementById("knockout-tracker");

    const qualifiedQs = new Set(["Qualified", "ConfirmedQualified"]);

    // Sort by number of teams still alive in the knockout stage
    const players = Object.keys(sweepstake).sort((a, b) => {
      const alive = p => sweepstake[p].filter(t => {
        const id = standingsMap[t]?.id;
        return id && qualifiedQs.has(standingsMap[t]?.qs) && !eliminatedIds.has(id);
      }).length;
      return alive(b) - alive(a);
    });

    container.innerHTML = `<div class="ko-grid">${players.map(person => {
      const teams = sweepstake[person];

      const aliveCount = teams.filter(teamName => {
        const t = standingsMap[teamName];
        return t && qualifiedQs.has(t.qs) && !eliminatedIds.has(t.id);
      }).length;

      // Show ALL three teams — group stage exits included
      const teamRows = teams.map(teamName => {
        const t         = standingsMap[teamName];
        const id        = t?.id;
        const countryId = t?.country ?? "";
        const qs        = t?.qs ?? "Unknown";

        let badgeCls, badgeLabel, rowCls;

        if (!qualifiedQs.has(qs)) {
          // Knocked out in group stage
          badgeCls   = "ko-badge-out";
          badgeLabel = "Group Stage";
          rowCls     = "ko-row-out";
        } else if (eliminatedIds.has(id)) {
          // Made it to knockouts but since eliminated
          badgeCls   = "ko-badge-out";
          badgeLabel = eliminatedRound[id] ?? "Eliminated";
          rowCls     = "ko-row-out";
        } else {
          // Still in the tournament
          badgeCls   = "ko-badge-in";
          badgeLabel = "Still In";
          rowCls     = "ko-row-in";
        }

        return `
          <div class="ko-team-row ${rowCls}">
            <img class="ko-flag" src="${flagUrl(countryId)}" alt="${teamName}" />
            <span class="ko-team-name">${teamName}</span>
            <span class="ko-status-badge ${badgeCls}">${badgeLabel}</span>
          </div>`;
      }).join("");

      return `
        <div class="ko-card ${aliveCount === 0 ? 'ko-all-out' : ''}">
          <div class="ko-card-header">
            <span class="ko-person">${person}</span>
            <span class="ko-alive-pill ${aliveCount > 0 ? 'pill-alive' : 'pill-dead'}">${aliveCount} still in</span>
          </div>
          <div class="ko-team-list">${teamRows}</div>
        </div>`;
    }).join("")}</div>`;
  }

  // GROUP STAGE LEADERBOARD //

  function buildTeamRows(teams) {
    return teams.map(teamName => {
      const t = standingsMap[teamName];
      if (!t) return `
        <tr class="team-row not-found-row">
          <td colspan="12">${teamName} — not yet in standings</td>
        </tr>`;

      return `
        <tr class="team-row">
          <td class="team-cell">
            <div class="team-name">${t.team}</div>
            <div class="team-group">${t.group}</div>
          </td>
          <td>${t.pos}</td>
          <td>${t.played}</td>
          <td>${t.won}</td>
          <td>${t.drawn}</td>
          <td>${t.lost}</td>
          <td>${t.gf}</td>
          <td>${t.ga}</td>
          <td>${fmtGD(t.gd)}</td>
          <td>${t.tcs}</td>
          <td class="pts-cell">${t.points}</td>
          <td>${qsBadge(t.qs)}</td>
        </tr>`;
    }).join("");
  }

  function renderQualifiersLeaderboard() {
    const players = Object.keys(sweepstake).sort(
      (a, b) => getPlayerTotals(sweepstake[b]).points - getPlayerTotals(sweepstake[a]).points
    );

    const lb = document.getElementById("round-leaderboard");
    lb.innerHTML = "";

    players.forEach((person, i) => {
      const rank    = i + 1;
      const teams   = sweepstake[person];
      const tot     = getPlayerTotals(teams);
      const medal   = rank === 1 ? "🥇" : rank === 2 ? "🥈" : rank === 3 ? "🥉" : rank;
      const rankCls = rank <= 3 ? `rank-${rank}` : "";

      const card = document.createElement("div");
      card.className = `player-card ${rankCls}`;

      card.innerHTML = `
        <div class="card-inner">
          <div class="card-name-col">
            <span class="rank-badge">${medal}</span>
            <div>
              <div class="player-name">${person}</div>
              <div class="player-teams">${teams.join(" · ")}</div>
            </div>
          </div>
          <div class="card-table-wrap">
            <table class="card-table">
              <thead>
                <tr>
                  <th class="col-team">Team</th>
                  <th>Pos</th>
                  <th>P</th>
                  <th>W</th>
                  <th>D</th>
                  <th>L</th>
                  <th>GF</th>
                  <th>GA</th>
                  <th>GD</th>
                  <th>TCS</th>
                  <th>Pts</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody>
                <tr class="totals-row">
                  <td class="team-cell totals-label">Totals</td>
                  <td>—</td>
                  <td>${tot.played}</td>
                  <td>${tot.won}</td>
                  <td>${tot.drawn}</td>
                  <td>${tot.lost}</td>
                  <td>${tot.gf}</td>
                  <td>${tot.ga}</td>
                  <td>${fmtGD(tot.gd)}</td>
                  <td>${tot.tcs}</td>
                  <td class="pts-cell">${tot.points}</td>
                  <td>—</td>
                </tr>
                ${buildTeamRows(teams)}
              </tbody>
            </table>
          </div>

          <div class="expand-icon">▼</div>
        </div>
      `;

      card.addEventListener("click", () => card.classList.toggle("active"));
      lb.appendChild(card);
    });
  }

  // LIGHT/DARK MODE //

  function toggleTheme() {
    const isDark = document.body.classList.toggle("light");
    document.querySelector(".theme-btn").textContent = isDark ? "☾" : "☀";
  }

  loadData();
</script>
</body>
</html>
